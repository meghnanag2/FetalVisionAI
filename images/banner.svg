<svg width="1200" height="340" viewBox="0 0 1200 340" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>FetalVisionAI</title>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f8fa"/>
    </linearGradient>
    <linearGradient id="ekg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b02020"/>
      <stop offset="60%" stop-color="#6a1a3a"/>
      <stop offset="100%" stop-color="#1a2a5a"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#8ab0cc" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="340" fill="url(#bg)"/>

  <!-- Title -->
  <text
    x="600" y="88"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="72"
    font-weight="700"
    fill="#0d1f35"
    text-anchor="middle"
    letter-spacing="1"
  >FetalVisionAI</text>

  <!-- Subtitle -->
  <text
    x="600" y="122"
    font-family="'Segoe UI', Arial, sans-serif"
    font-size="16"
    font-weight="500"
    fill="#3a5a78"
    text-anchor="middle"
    letter-spacing="5"
  >MULTIMODAL DEEP LEARNING FOR PRENATAL CHD SCREENING</text>

  <!-- EKG line with single dramatic spike centered -->
  <!-- flat left → small bump → big QRS spike → small bump → flat right -->
  <polyline
    points="80,200  430,200  455,200  468,188  478,210  488,148  498,248  506,200  522,200  534,190  542,200  700,200  1120,200"
    fill="none"
    stroke="url(#ekg)"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#shadow)"
  />

  <!-- Tag pills -->
  <rect x="284" y="268" width="180" height="40" rx="20" fill="#0d1f35"/>
  <text x="374" y="293" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#ffffff" text-anchor="middle" font-weight="500">Multimodal AI</text>

  <rect x="510" y="268" width="180" height="40" rx="20" fill="#0d1f35"/>
  <text x="600" y="293" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#ffffff" text-anchor="middle" font-weight="500">CHD Detection</text>

  <rect x="736" y="268" width="180" height="40" rx="20" fill="#0d1f35"/>
  <text x="826" y="293" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#ffffff" text-anchor="middle" font-weight="500">Health Equity</text>

  <!-- Copyright -->
  <text x="600" y="332" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#6a8aaa" text-anchor="middle">© 2025 Vanessa Thorsten &amp; Meghna Nag · University of Colorado Boulder</text>

</svg>
